<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Checkout Megabyte Store por WhatsApp.">
  <title>Checkout | Megabyte</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/styles.css?v=site-20260712-7">
</head>
<body class="store-body" data-store-page="checkout">
  <header class="store-header">
    <div class="container store-header__inner">
      <a href="/" class="store-logo" aria-label="Salir de la tienda y volver a la landing">
        <img src="/assets/logo-menu-mark.png" alt="Megabyte" width="92" height="62">
      </a>
      <nav class="store-nav store-nav--compact" aria-label="Navegación tienda">
        <a href="/tienda">Productos</a>
        <a href="/carrito">Carrito</a>
      </nav>
      <div class="store-header__actions">
        <a class="store-exit" href="/">Salir de la tienda</a>
        <a class="store-cart" href="/carrito"><span>Carrito</span><strong data-cart-count hidden>0</strong></a>
      </div>
    </div>
  </header>

  <main class="store-main checkout-page">
    <section class="store-section">
      <div class="container checkout-page__grid">
        <form class="checkout-form" id="checkoutForm">
          <span class="section__tag">Datos del cliente</span>
          <h1>Finalizar por WhatsApp</h1>
          <div class="form-row">
            <div class="form-group"><label for="nombre">Nombre</label><input id="nombre" name="nombre" required></div>
            <div class="form-group"><label for="celular">Celular</label><input id="celular" name="celular" required></div>
          </div>
          <div class="form-row">
            <div class="form-group"><label for="correo">Correo</label><input id="correo" name="correo" type="email" required></div>
            <div class="form-group"><label for="ciudad">Ciudad</label><input id="ciudad" name="ciudad" required></div>
          </div>
          <div class="form-group"><label for="direccion">Dirección</label><input id="direccion" name="direccion" required></div>
          <div class="form-group">
            <label for="entrega">Método de entrega</label>
            <select id="entrega" name="entrega" required>
              <option value="Recoger en tienda">Recoger en tienda</option>
              <option value="Domicilio coordinado">Domicilio coordinado</option>
              <option value="Instalación en sitio">Instalación en sitio</option>
            </select>
          </div>
          <div class="form-group"><label for="observaciones">Observaciones</label><textarea id="observaciones" name="observaciones" rows="4"></textarea></div>
          <button class="btn btn--primary btn--full" type="submit">Enviar pedido por WhatsApp</button>
        </form>
        <aside class="checkout-summary">
          <h2>Resumen del pedido</h2>
          <div id="checkoutSummary"></div>
          <div class="checkout-summary__total"><span>Total</span><strong id="checkoutTotal">$0</strong></div>
        </aside>
      </div>
    </section>
  </main>

  <footer class="footer footer--store">
    <div class="container footer__inner">
      <div class="footer__top">
        <a href="/" class="footer__brand" aria-label="Salir de la tienda y volver al inicio">
          <img src="/assets/logo-menu-megabyte.png" alt="Megabyte" width="190" height="64">
        </a>
        <nav class="footer__nav" aria-label="Navegacion inferior de tienda">
          <a href="/">Landing</a>
          <a href="/tienda">Catalogo</a>
          <a href="/carrito">Carrito</a>
          <a href="/checkout">Checkout</a>
          <a href="/contacto">Contacto</a>
        </nav>
      </div>
      <div class="footer__bottom">
        <p class="footer__copy">&copy; 2026 Megabyte Store. Todos los derechos reservados.</p>
        <div class="footer__credit" aria-label="Desarrollador de la pagina">
          <span>Pagina desarrollada por</span>
          <img src="/assets/andev-logo.png" alt="Andev" width="92" height="42">
          <strong>Andres Prias</strong>
        </div>
      </div>
    </div>
  </footer>

  <script src="/js/store.js?v=store-20260712-5"></script>
</body>
</html>
