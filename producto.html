<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Detalle de producto Megabyte MB Store.">
  <title>Producto | Megabyte MB</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Montserrat:wght@600;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="store-body" data-store-page="product">
  <header class="store-header">
    <div class="container store-header__inner">
      <a href="index.html" class="store-logo" aria-label="Salir de la tienda y volver a la landing">
        <img src="assets/logo-menu-mark.png" alt="Megabyte MB" width="92" height="62">
      </a>
      <nav class="store-nav store-nav--compact" aria-label="Navegación tienda">
        <a href="tienda.html">Productos</a>
        <a href="carrito.html">Carrito</a>
        <a href="checkout.html">Checkout</a>
      </nav>
      <div class="store-header__actions">
        <a class="store-exit" href="index.html">Salir de la tienda</a>
        <a class="btn btn--whatsapp btn--sm" href="https://wa.me/573133141701" target="_blank" rel="noopener noreferrer">WhatsApp</a>
        <a class="store-cart" href="carrito.html"><span>Carrito</span><strong data-cart-count hidden>0</strong></a>
      </div>
    </div>
  </header>

  <main class="store-main">
    <section class="store-section">
      <div class="container">
        <div class="product-detail" id="productDetail"></div>
      </div>
    </section>
    <section class="store-section store-section--compact">
      <div class="container">
        <div class="store-section__head">
          <div>
            <span class="section__tag">También te puede servir</span>
            <h2>Productos relacionados</h2>
          </div>
        </div>
        <div class="product-grid product-grid--related" id="relatedProducts"></div>
      </div>
    </section>
  </main>

  <script src="js/store.js"></script>
</body>
</html>
